name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Run container on port 80
        run: docker run -d --name app -p 80:8080 app:${{ github.sha }}

      - name: Verify with apprentice-action
        uses: liatrio/github-actions/apprentice-action@0b41561cca6822cc8d880fe0e49e7807a41fdf91

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/liatrio-api-hub
          docker tag app:${{ github.sha }} $IMAGE:${{ github.sha }}
          docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy versioned image to Cloud Run
        run: |
          IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/liatrio-api-hub:${{ github.sha }}

          gcloud run deploy liatrio-api-hub \
            --image "$IMAGE" \
            --region us-west1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars APP_VERSION=${{ github.sha}}