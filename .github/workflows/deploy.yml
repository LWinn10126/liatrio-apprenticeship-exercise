name: Deploy to Cloud Run

on:
    workflow_run:
        workflows: ["CI Pipeline"]
        types:
            - completed

jobs:
    deploy:
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main'
        runs-on: ubuntu-latest

        steps:
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_CREDENTIALS }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v2

            - name: Deploy versioned image to Cloud Run
              run: |
                    IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/liatrio-api-hub:${{ github.sha }}

                    gcloud run deploy liatrio-api-hub \
                        --image $IMAGE \
                        --region us-west1 \
                        --platform managed \
                        --allow-unauthenticated
                        --set-env-vars APP_VERSION=${{ github.event.workflow_run.head_sha }}